# mysql-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: req-db
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: req-db
  template:
    metadata:
      labels:
        app: req-db
    spec:
      restartPolicy: Always
      containers:
        - name: mysql
          image: zyzelq/req-db:v1
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "123123"
            - name: MYSQL_DATABASE
              value: "request_manager"
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          resources:
            limits:
              memory: "1024Mi"
              cpu: "1024m"
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc

---
# mysql-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: req-db
  namespace: default
spec:
  selector:
    app: req-db
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
  type: ClusterIP

---
# mysql-pvc.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
