apiVersion: apps/v1
kind: Deployment
metadata:
  name: req-back
spec:
  selector:
    matchLabels:
      app: req-back
  template:
    metadata:
      labels:
        app: req-back
    spec:
      containers:
        - name: req-back
          image: zyzelq/req-back:v1
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1" # 1 ядро
              memory: "1Gi"
