apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: req-ingress
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://frontend.local, http://api.frontend.local, http://localhost:5173, http://127.0.0.1"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: "frontend.local"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
    - host: "api.frontend.local"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: req-back
                port:
                  number: 8000
