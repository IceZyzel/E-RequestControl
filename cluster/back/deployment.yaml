# backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: req-back
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: req-back
  template:
    metadata:
      labels:
        app: req-back
    spec:
      restartPolicy: Always
      containers:
        - name: backend
          image: zyzelq/req-back:v2
          resources:
            limits:
              memory: "1024Mi"
              cpu: "1024m"
          env:
            - name: DB_HOST
              value: "req-db"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "123123"
            - name: DB_NAME
              value: "request_manager"
          ports:
            - containerPort: 8000

---
# backend-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: req-back
  namespace: default
spec:
  selector:
    app: req-back
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
